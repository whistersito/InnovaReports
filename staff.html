<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Inter:wght@400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #F2F5FA;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
      padding: 24px;
    }
    h1 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      color: #003087;
    }
    p { color: #6B7280; }
    a {
      margin-top: 8px;
      display: inline-block;
      padding: 10px 24px;
      background: #003087;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      transition: background 0.15s;
    }
    a:hover { background: #E3000F; }
  </style>
</head>
