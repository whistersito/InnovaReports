<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Innova Reports – Panel Staff</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #1A3A6B; --green: #6AB42B; --orange: #F5A623; --blue: #2F80C2; --white: #FFFFFF; --light: #EEF3F9; --gray: #6B7280; }
    body { min-height: 100vh; background: var(--light); font-family: 'Inter', sans-serif; }

    /* LOGIN */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%); }
    .login-card { background: var(--white); border-radius: 24px; padding: 48px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(26,58,107,0.25); }
    .login-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.6rem; color: var(--navy); text-align: center; margin-bottom: 28px; }
    .field { width: 100%; padding: 11px 14px; border: 2px solid #E2E8F0; border-radius: 10px; font-size: 0.9rem; margin-bottom: 14px; font-family: 'Inter', sans-serif; }
    .field:focus { outline: none; border-color: var(--green); }
    .btn-login { width: 100%; padding: 12px; background: var(--navy); color: var(--white); border: none; border-radius: 10px; font-family: 'Nunito', sans-serif; font-weight: 800; cursor: pointer; transition: background 0.15s; }
    .btn-login:hover { background: var(--green); }
    .login-error { color: #EF4444; font-size: 0.85rem; padding: 10px; background: #FEE2E2; border-radius: 8px; margin-bottom: 14px; text-align: center; display: none; animation: shake 0.4s ease; }
    .login-error.show { display: block; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

    /* DASHBOARD */
    .dashboard-wrap { display: none; }
    .dashboard-wrap.show { display: flex; min-height: 100vh; }
    header { background: var(--navy); height: 62px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; width: 100%; color: var(--white); }
    .header-logo { display: flex; align-items: center; gap: 10px; }
    .header-logo img { height: 36px; }
    .header-logo span { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.95rem; }
    .header-right { display: flex; align-items: center; gap: 16px; font-size: 0.85rem; }
    .logout-btn { background: rgba(255,255,255,0.2); border: none; color: var(--white); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-weight: 700; }
    .logout-btn:hover { background: rgba(255,255,255,0.3); }

    .green-bar { background: var(--green); padding: 10px 28px; color: var(--white); font-family: 'Nunito', sans-serif; font-weight: 700; width: 100%; }
    .main-content { flex: 1; padding: 40px 28px; max-width: 1200px; margin: 0 auto; width: 100%; }
    .dash-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.8rem; color: var(--navy); margin-bottom: 4px; }
    .dash-title span { color: var(--green); }
    .dash-sub { font-size: 0.9rem; color: var(--gray); margin-bottom: 24px; }

    .filters-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-input { flex: 1; min-width: 200px; padding: 10px 15px; border: 2px solid #E2E8F0; border-radius: 10px; font-size: 0.9rem; font-family: 'Inter', sans-serif; }
    .filter-input:focus { outline: none; border-color: var(--green); }

    .reports-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
    .report-card { background: var(--white); border-radius: 16px; padding: 20px; box-shadow: 0 4px 12px rgba(26,58,107,0.08); border-left: 5px solid var(--orange); transition: transform 0.2s, box-shadow 0.2s; }
    .report-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(26,58,107,0.12); }
    .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .report-id { font-family: 'Nunito', sans-serif; font-weight: 900; color: var(--navy); font-size: 0.95rem; }
    .report-status { padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 700; }
    .report-status:nth-child(2) { background: #FEE2E2; color: #DC2626; }
    .report-status.en-progreso { background: #DBEAFE; color: #2563EB; }
    .report-status.resuelto { background: #DCFCE7; color: #16A34A; }
    .report-motivo { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.05rem; color: var(--navy); margin-bottom: 8px; }
    .report-categoria { font-size: 0.85rem; color: var(--gray); margin-bottom: 6px; }
    .report-meta { font-size: 0.8rem; color: #9CA3AF; margin-bottom: 12px; }
    .report-desc { font-size: 0.9rem; color: var(--gray); line-height: 1.5; margin-bottom: 16px; max-height: 60px; overflow: hidden; text-overflow: ellipsis; }
    .report-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-status { padding: 6px 10px; border: 2px solid #E2E8F0; background: var(--white); border-radius: 6px; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-status:hover { background: var(--light); }
    .btn-status.active { background: var(--navy); color: var(--white); border-color: var(--navy); }

    .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; }
    .empty-state-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { color: var(--gray); font-size: 0.95rem; }

    @media (max-width: 600px) {
      .filters-bar { flex-direction: column; }
      .reports-grid { grid-template-columns: 1fr; }
      .main-content { padding: 24px 16px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-wrap" id="login-wrap">
    <div class="login-card">
      <h1 class="login-title">Innova <span>Reports</span></h1>
      <div class="login-error" id="login-error">❌ Usuario o contraseña incorrecta</div>
      <form onsubmit="handleLogin(event)">
        <input type="text" class="field" id="username" placeholder="Usuario" autocomplete="off"/>
        <input type="password" class="field" id="password" placeholder="Contraseña" autocomplete="off"/>
        <button type="submit" class="btn-login">Entrar</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard-wrap" id="dashboard-wrap">
    <div style="width: 100%; display: flex; flex-direction: column;">
      <header>
        <div class="header-logo">
          <img src="logo.png" alt="Innova"/>
          <span>Innova Reports</span>
        </div>
        <div class="header-right">
          <span>👤 <span id="user-display">Staff</span></span>
          <button class="logout-btn" onclick="handleLogout()">Cerrar sesión</button>
        </div>
      </header>
      <div class="green-bar">📋 Panel de Control — Denuncias y Reportes</div>
      
      <div class="main-content">
        <h2 class="dash-title">Denuncias <span>Pendientes</span> <span style="font-size: 0.5em; color: #9CA3AF; display: inline-block; background: var(--light); padding: 4px 12px; border-radius: 99px; margin-left: 8px;" id="count-badge">0</span></h2>
        <p class="dash-sub">Revisa y gestiona todas las denuncias anónimas enviadas por estudiantes.</p>

        <div class="filters-bar">
          <input type="text" class="filter-input" id="search-input" placeholder="🔍 Buscar por ubicación o motivo..." oninput="applyFilters()"/>
          <select class="filter-input" id="status-filter" style="flex: 0 1 150px;" onchange="applyFilters()">
            <option value="">Todos los estados</option>
            <option value="Pendiente">Pendiente</option>
            <option value="En progreso">En progreso</option>
            <option value="Resuelto">Resuelto</option>
          </select>
        </div>

        <div class="reports-grid" id="reports-grid">
          <div class="empty-state">
            <div class="empty-state-icon">⏳</div>
            <p>Cargando denuncias...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const VALID_USER = 'innova';
    const VALID_PASS = 'innova2026';
    let allReports = [];

    // ═══════════════════════════════════════════
    // FUNCIONES DE LOGIN
    // ═══════════════════════════════════════════
    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const error = document.getElementById('login-error');

      if (user === VALID_USER && pass === VALID_PASS) {
        error.classList.remove('show');
        sessionStorage.setItem('staffLoggedIn', 'true');
        sessionStorage.setItem('staffUser', user);
        
        document.getElementById('login-wrap').style.display = 'none';
        document.getElementById('dashboard-wrap').classList.add('show');
        document.getElementById('user-display').textContent = user;
        loadReports();
      } else {
        error.classList.add('show');
        document.getElementById('password').value = '';
      }
    }

    function handleLogout() {
      sessionStorage.removeItem('staffLoggedIn');
      sessionStorage.removeItem('staffUser');
      document.getElementById('login-wrap').style.display = 'flex';
      document.getElementById('dashboard-wrap').classList.remove('show');
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('login-error').classList.remove('show');
    }

    // ═══════════════════════════════════════════
    // FUNCIONES DE DENUNCIAS
    // ═══════════════════════════════════════════
    function getDenuncias() {
      try {
        return JSON.parse(localStorage.getItem('innovaReportsDenuncias') || '[]');
      } catch (e) {
        return [];
      }
    }

    function saveDenuncias(lista) {
      localStorage.setItem('innovaReportsDenuncias', JSON.stringify(lista));
    }

    function loadReports() {
      const denuncias = getDenuncias();
      allReports = denuncias.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
      
      console.log('✅ Denuncias cargadas:', allReports.length);
      console.log('📋 Contenido:', allReports);
      
      if (allReports.length === 0) {
        document.getElementById('reports-grid').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No hay denuncias en este momento. ¡Qué buena convivencia! ✨</p></div>';
        document.getElementById('count-badge').textContent = '0';
        return;
      }

      applyFilters();
    }

    function applyFilters() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      const statusFilter = document.getElementById('status-filter').value;
      
      let filtered = allReports;
      
      if (searchTerm) {
        filtered = filtered.filter(r => 
          r.motivo.toLowerCase().includes(searchTerm) || 
          r.lugar.toLowerCase().includes(searchTerm) ||
          r.id.toLowerCase().includes(searchTerm)
        );
      }
      
      if (statusFilter) {
        filtered = filtered.filter(r => r.estado === statusFilter);
      }

      renderReports(filtered);
    }

    function renderReports(denuncias) {
      const grid = document.getElementById('reports-grid');
      const badge = document.getElementById('count-badge');
      
      badge.textContent = allReports.length;

      if (!denuncias || denuncias.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No hay resultados.</p></div>';
        return;
      }

      grid.innerHTML = denuncias.map(r => {
        let fecha = r.fecha;
        if (typeof fecha === 'string') {
          fecha = new Date(fecha).toLocaleDateString('es-PE', { day: 'short', month: 'short', year: 'numeric' });
        }

        const statusClass = r.estado === 'Resuelto' ? 'resuelto' : r.estado === 'En progreso' ? 'en-progreso' : '';
        
        return `
          <div class="report-card">
            <div class="report-header">
              <span class="report-id">#${r.id}</span>
              <span class="report-status ${statusClass}">${r.estado}</span>
            </div>
            <div class="report-motivo">${r.motivo}</div>
            <div class="report-categoria">📌 ${r.categoria}</div>
            <div class="report-meta">📍 ${r.lugar} · 📅 ${fecha}</div>
            <div class="report-desc">${r.descripcion}</div>
            <div class="report-actions">
              <button class="btn-status ${r.estado === 'Pendiente' ? 'active' : ''}" onclick="updateReport('${r.id}', 'Pendiente')">Pendiente</button>
              <button class="btn-status ${r.estado === 'En progreso' ? 'active' : ''}" onclick="updateReport('${r.id}', 'En progreso')">Progreso</button>
              <button class="btn-status ${r.estado === 'Resuelto' ? 'active' : ''}" onclick="updateReport('${r.id}', 'Resuelto')">Resuelto</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateReport(id, nuevoEstado) {
      const lista = getDenuncias();
      const idx = lista.findIndex(d => d.id === id);
      if (idx !== -1) {
        lista[idx].estado = nuevoEstado;
        saveDenuncias(lista);
        console.log(`✅ Denuncia ${id} actualizada a: ${nuevoEstado}`);
        loadReports();
      }
    }

    // ═══════════════════════════════════════════
    // VERIFICAR LOGIN AL CARGAR
    // ═══════════════════════════════════════════
    window.addEventListener('load', () => {
      if (sessionStorage.getItem('staffLoggedIn') === 'true') {
        document.getElementById('login-wrap').style.display = 'none';
        document.getElementById('dashboard-wrap').classList.add('show');
        document.getElementById('user-display').textContent = sessionStorage.getItem('staffUser');
        loadReports();
      }
    });
  </script>

</body>
</html>
