<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Innova Reports</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #E3000F;
      --navy:   #003087;
      --white:  #FFFFFF;
      --light:  #F2F5FA;
      --gray:   #6B7280;
      --card-shadow: 0 4px 24px rgba(0,48,135,0.10);
    }

    body {
      min-height: 100vh;
      background: var(--light);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      padding: 18px 32px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      background: var(--white);
      box-shadow: 0 1px 0 rgba(0,48,135,0.08);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    /* Logo Innova Schools recreado con CSS */
    .logo-icon {
      width: 40px;
      height: 40px;
      position: relative;
      flex-shrink: 0;
    }
    .logo-icon svg { width: 100%; height: 100%; }

    .logo-text {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.05rem;
      line-height: 1.1;
    }
    .logo-text span.red  { color: var(--red); }
    .logo-text span.navy { color: var(--navy); }

    /* ── HERO ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 64px;
      text-align: center;
    }

    .brand-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(2.6rem, 7vw, 4.2rem);
      letter-spacing: -1.5px;
      line-height: 1;
      margin-bottom: 12px;
    }
    .brand-title .innova { color: var(--navy); }
    .brand-title .reports { color: var(--red); }

    .subtitle {
      font-size: 1.05rem;
      color: var(--gray);
      margin-bottom: 52px;
      font-weight: 400;
    }

    /* ── CARDS ── */
    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 36px;
      width: 220px;
      box-shadow: var(--card-shadow);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      border: 2px solid transparent;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 36px rgba(0,48,135,0.16);
      border-color: var(--navy);
    }
    .card:focus-visible {
      outline: 3px solid var(--red);
      outline-offset: 3px;
    }

    .card-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.9rem;
    }
    .card--student .card-icon { background: #E8EEF9; }
    .card--staff   .card-icon { background: #FDE8EA; }

    .card-label {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.05rem;
      color: var(--navy);
      text-align: center;
    }
    .card-sub {
      font-size: 0.8rem;
      color: var(--gray);
      text-align: center;
      line-height: 1.4;
      margin-top: -8px;
    }

    
    .badge-soon {
      background: #FDE8EA;
      color: var(--red);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 99px;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.78rem;
      color: #9CA3AF;
    }
  </style>
</head>
<body>

  <!-- HEADER con logo arriba a la derecha -->
  <header>
    <div class="logo-wrap">
      <div class="logo-icon">
        <!-- Logo Innova Schools simplificado -->
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="8" fill="#003087"/>
          <rect x="7" y="7" width="11" height="11" rx="2" fill="#E3000F"/>
          <rect x="22" y="7" width="11" height="11" rx="2" fill="#FFFFFF"/>
          <rect x="7" y="22" width="11" height="11" rx="2" fill="#FFFFFF"/>
          <rect x="22" y="22" width="11" height="11" rx="2" fill="#E3000F"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="navy">Innova</span> <span class="red">Schools</span>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <main>
    <h1 class="brand-title">
      <span class="innova">Innova</span>&nbsp;<span class="reports">Reports</span>
    </h1>
    <p class="subtitle">Plataforma de denuncias anónimas para una mejor convivencia</p>

    <div class="cards">

      <!-- ESTUDIANTE → enlaza a student.html -->
      <a href="student.html" class="card card--student" aria-label="Soy Estudiante">
        <div class="card-icon">🎒</div>
        <div class="card-label">Soy Estudiante</div>
        <p class="card-sub">Reporta de forma segura y anónima</p>
      </a>

      <!-- PROFESORES / ED → lleva a staff.html -->
      <a href="staff.html" class="card card--staff" aria-label="Profesores y Equipo Directivo">
        <div class="card-icon">🏫</div>
        <div class="card-label">Profesores y ED</div>
        <span class="badge-soon">Próximamente</span>
      </a>

    </div>
  </main>

  <footer>© 2025 Innova Schools · Innova Reports</footer>

</body>
</html>
